name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # `changeset status --since` diffs against the base branch, so the
          # shallow default clone isn't enough.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Format check
        run: bun run fmt:check
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Typecheck worker
        run: bun run typecheck:worker
      - name: Typecheck tests
        run: bun run typecheck:test
      - name: Unit tests
        run: bun run test
      # Every PR discloses what it changed, or says out loud that it changed
      # nothing worth telling anyone (`bunx changeset --empty`). A version bump
      # nobody trusts is worse than no version at all -- ADR 0046.
      - name: Changeset present
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
          bunx changeset status --since="origin/$GITHUB_BASE_REF"

  # Blocking, like everything else in this workflow. Flake policy (#202): a
  # flaky spec gets `test.fixme()` + a follow-up issue, never a merge-anyway
  # habit -- there is no advisory/continue-on-error escape valve here.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Install Playwright chromium
        run: bunx playwright install --with-deps chromium
      # Serial (--workers=1) on purpose: --workers=2 is the clean-signal
      # config on a dev box, but the hosted runner can't sustain it -- the
      # baseline PR run failed 10 diverse specs, all load/contention-shaped
      # (seeded node not visible within the expect timeout, select-all
      # races), each past its retry. Serial trades ~2x wall time for a
      # signal that's about the code. The suite boots its own vite server
      # on :3210 and the fixtures mock /api, so no Worker/D1 setup needed.
      - name: Playwright e2e
        run: bun run test:e2e:serial
