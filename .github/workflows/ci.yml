name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.4.0"
      - run: bun install --frozen-lockfile
      - name: Format check
        run: bun run fmt:check
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
