name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # `changeset status --since` diffs against the base branch, so the
          # shallow default clone isn't enough.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Format check
        run: bun run fmt:check
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Typecheck worker
        run: bun run typecheck:worker
      - name: Typecheck tests
        run: bun run typecheck:test
      - name: Unit tests
        run: bun run test
      # Every PR discloses what it changed, or says out loud that it changed
      # nothing worth telling anyone (`bunx changeset --empty`). A version bump
      # nobody trusts is worse than no version at all -- ADR 0046.
      - name: Changeset present
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
          bunx changeset status --since="origin/$GITHUB_BASE_REF"

  # Blocking, like everything else in this workflow. Flake policy (#202): a
  # flaky spec gets `test.fixme()` + a follow-up issue, never a merge-anyway
  # habit -- there is no advisory/continue-on-error escape valve here.
  # macOS, not ubuntu, and that is load-bearing: the specs press `Meta+`
  # combos (the suite is written for macOS Chromium -- see the caret notes
  # in AGENTS.md), and on a Linux runner Meta is not Mod, so undo/paste/
  # select-all silently never fire (5 specs failed exactly that way on
  # ubuntu, past their retries; the slower runner also cold-start-failed
  # the first specs at both --workers=2 and serial). The repo is public,
  # so macOS minutes are free.
  e2e:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Install Playwright chromium
        run: bunx playwright install --with-deps chromium
      # NOT a gate -- a cache warmer. On a fresh runner the first page load
      # pays vite's whole dep optimization, which alone eats the 5s expect
      # timeout, so whichever specs run first fail past their retry (the
      # atomic-structural-writes trio + breadcrumb-mobile did, on every cold
      # run). This shard boots the same :3210 server once and drives one real
      # page load; the persisted node_modules/.vite cache then carries the
      # warmth into the gated run below, where EVERY spec (this one included)
      # still blocks. That's why `|| true` here is not an advisory suite.
      - name: Warm the vite dep cache
        run: bun run test:e2e e2e/zoom-perf.spec.ts --workers=1 || true
      # --workers=2 is the documented clean-signal config (AGENTS.md); the
      # suite boots its own vite server on :3210 and the fixtures mock /api,
      # so no Worker/D1 setup is needed. `test:e2e:serial` (--workers=1) is
      # the local flake-hunting counterpart, maximum determinism over speed.
      - name: Playwright e2e
        run: bun run test:e2e --workers=2
