name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # `changeset status --since` diffs against the base branch, so the
          # shallow default clone isn't enough.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Format check
        run: bun run fmt:check
      - name: Lint
        run: bun run lint
      - name: Typecheck (app)
        run: bun run typecheck
      # The gate whose absence started this: a red `typecheck:worker` sat on
      # main unnoticed because nothing ran it. The worker has its own tsconfig
      # (workers-types, no DOM lib), so the app typecheck can't cover it.
      - name: Typecheck (worker)
        run: bun run typecheck:worker
      - name: Typecheck (tests)
        run: bun run typecheck:test
      - name: Unit tests
        run: bun run test
      - name: Build
        run: bun run build
      # Every PR discloses what it changed, or says out loud that it changed
      # nothing worth telling anyone (`bunx changeset --empty`). A version bump
      # nobody trusts is worse than no version at all -- ADR 0046.
      - name: Changeset present
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
          bunx changeset status --since="origin/$GITHUB_BASE_REF"

# The Playwright e2e suite is deliberately NOT a CI job. It's macOS-authored
# (Cmd/`Meta` keybindings, caret geometry, dev-server timing) and doesn't run
# green on Linux runners without a portability pass -- and a 12-minute browser
# job on every push isn't worth the Actions minutes for that. It stays a LOCAL
# pre-PR gate instead: run `bun run test:e2e` before opening a PR
# (CONTRIBUTING.md "Before you open a PR").
