# Codex app "local environment" for dotflowy.
#
# `[setup] script` runs automatically when the Codex app creates a worktree for
# a new task. It is the Codex-side twin of Claude Code's `WorktreeCreate` hook
# (`.claude/hooks/create-worktree.ts`); both call `bun run bootstrap`, so the
# two harnesses can't drift.
#
# Committed on purpose: checking this into git is the documented way to share a
# local environment with everyone who clones the repo.
#
# NOTE: the Codex app owns this file. Editing the environment through its
# settings pane REWRITES it, dropping these comments and re-adding an
# "AUTOGENERATED" banner. That's expected; re-add the comments if you care.
#
# Codex injects no path to the base repo (openai/codex#13576), and each line of
# a setup script runs in its own bash session. `bun run bootstrap` sidesteps
# both: it's one line, and it resolves the base repo itself.
version = 1
name = "dotflowy"

[setup]
script = '''
set -euo pipefail

if ! command -v bun >/dev/null 2>&1; then
  echo "bun is not on PATH. Install it: https://bun.sh" >&2
  exit 1
fi

bun run bootstrap
'''

[[actions]]
name = "dev"
icon = "run"
command = "bun run dev"

[[actions]]
name = "typecheck"
icon = "tool"
command = "bun run typecheck"

[[actions]]
name = "lint"
icon = "tool"
command = "bun run lint"

[[actions]]
name = "test"
icon = "tool"
command = "bun run test"
